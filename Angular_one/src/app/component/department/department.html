<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Department List</h2>
    <a routerLink="/department/save" class="btn btn-primary">+ Add Department</a>
  </div>

  <div *ngIf="isLoading" class="text-center">
    <div class="spinner-border" role="status"></div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <table class="table table-bordered table-hover" *ngIf="!isLoading">
    <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Email</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let dept of departmentList; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ dept.name }}</td>
        <td>{{ dept.email }}</td>
        <td>
          <a [routerLink]="['/department/edit', dept.id]" class="btn btn-sm btn-warning me-2">Edit</a>
          <button (click)="deleteDepartment(dept.id)" class="btn btn-sm btn-danger">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
