<thead>
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Fee</th>
    <th>Action</th>
</tr>
</thead>
<tbody>
    <tr *ngFor="let s of students">
        <td>{{s.id}}</td>
        <td>{{s.name}}</td>
        <td>{{s.email}}</td>
        <td>{{s.phone}}</td>
        <td>{{s.fee}}</td>
        <td>
            <button class="btn btn-danger mx-3">Edit</button>
            <button class="btn btn-danger mx-3">Delete</button>
        </td>
    </tr>
</tbody>
