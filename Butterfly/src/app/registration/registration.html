<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">

      <div class="card border-0 shadow-lg">

        <!-- Header -->
        <div class="card-header bg-lavender text-white text-center py-4">
          <h2 class="fw-bold mb-1">Create Account</h2>
          <p class="mb-0">Join our community today</p>
        </div>

        <!-- Body -->
        <div class="card-body p-4">

          <!--
            action  → sends data to Spring Boot backend
            method  → POST sends data privately
            No Angular needed — browser handles everything!
          -->
          <form action="http://localhost:8080/api/registration" method="POST">

            <div class="row g-3">

              <!-- First Name -->
              <div class="col-md-6">
                <label class="form-label fw-semibold">First Name</label>
                <input name="firstName"
                       type="text"
                       class="form-control form-control-lg"
                       placeholder="Enter first name">
              </div>

              <!-- Last Name -->
              <div class="col-md-6">
                <label class="form-label fw-semibold">Last Name</label>
                <input name="lastName"
                       type="text"
                       class="form-control form-control-lg"
                       placeholder="Enter last name">
              </div>

              <!-- Phone -->
              <div class="col-md-6">
                <label class="form-label fw-semibold">Phone Number</label>
                <input name="phone"
                       type="text"
                       class="form-control form-control-lg"
                       placeholder="Enter phone number">
              </div>

              <!-- Email -->
              <div class="col-md-6">
                <label class="form-label fw-semibold">Email</label>
                <input name="email"
                       type="email"
                       class="form-control form-control-lg"
                       placeholder="Enter email">
              </div>

              <!-- Password -->
              <div class="col-md-6">
                <label class="form-label fw-semibold">Password</label>
                <input name="password"
                       type="password"
                       class="form-control form-control-lg"
                       placeholder="Enter password">
              </div>

              <!-- Confirm Password -->
              <div class="col-md-6">
                <label class="form-label fw-semibold">Confirm Password</label>
                <input name="confirmPassword"
                       type="password"
                       class="form-control form-control-lg"
                       placeholder="Re-enter password">
              </div>

              <!-- Submit -->
              <div class="col-12 mt-4">
                <button type="submit"
                        class="btn btn-lavender btn-lg w-100 fw-bold">
                  Create Account
                </button>
              </div>

            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>
