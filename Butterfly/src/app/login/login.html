<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">

      <div class="card border-0 shadow-lg">

        <div class="card-header bg-lavender text-white text-center py-4">
          <h2 class="fw-bold mb-1">Create Account</h2>
          <p class="mb-0">Join our community today</p>
        </div>

        <div class="card-body p-4">

          <form (ngSubmit)="createAccount()">

            <div class="row g-3">

              <div class="col-md-6">
                <label class="form-label fw-semibold">First Name</label>
                <input [(ngModel)]="user.firstName" name="firstName"
                       type="text" class="form-control form-control-lg">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Last Name</label>
                <input [(ngModel)]="user.lastName" name="lastName"
                       type="text" class="form-control form-control-lg">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Phone Number</label>
                <input [(ngModel)]="user.phone" name="phone"
                       type="text" class="form-control form-control-lg">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Email</label>
                <input [(ngModel)]="user.email" name="email"
                       type="email" class="form-control form-control-lg">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Password</label>
                <input [(ngModel)]="user.password" name="password"
                       type="password" class="form-control form-control-lg">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Confirm Password</label>
                <input [(ngModel)]="user.confirmPassword" name="confirmPassword"
                       type="password" class="form-control form-control-lg">
              </div>

              <div class="col-12 mt-4">
                <button type="submit"
                        class="btn btn-lavender btn-lg w-100 fw-bold">
                  Create Account
                </button>
              </div>

            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>
