<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card border-0 shadow-lg">

        <div class="card-header bg-lavender text-white text-center py-4">
          <h2 class="fw-bold mb-1">Welcome Back</h2>
          <p class="mb-0">Login to your account</p>
        </div>
        <div class="card-body p-4">
          <form>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label> 
              <input id="username" type="text" class="form-control form-control-lg" 
              placeholder="Enter Your Email">
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input id="password" type="password" class="form-control form-control-lg" placeholder="Enter password">
            </div>

            <button type="button" (click)="login()" class="btn btn-lavender btn-lg w-100 fw-bold"> Login
            </button>

            <div class="mt-4">
              <p class="text-center mb-2 fw-semibold">Don't have an account?</p>
              <a routerLink="/registration" class="btn btn-lavender btn-lg w-25 fw-bold">Register</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
