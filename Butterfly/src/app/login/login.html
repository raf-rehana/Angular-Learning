<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">
      <div class="card border-0 shadow-lg">
        <div class="card-header bg-primary text-white text-center py-4">
          <h2 class="fw-bold mb-1">Create Account</h2>
          <p class="mb-0">Join our community today</p>
        </div>

        <div class="card-body p-4">
          <form>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">First Name</label>
                <input type="text" class="form-control form-control-lg" placeholder="First Name">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Last Name</label>
                <input type="text" class="form-control form-control-lg" placeholder="Last Name">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Phone Number</label>
                <input type="text" class="form-control form-control-lg" placeholder="Phone Number">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control form-control-lg" placeholder="Email Address">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control form-control-lg" placeholder="Password">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Confirm Password</label>
                <input type="password" class="form-control form-control-lg" placeholder="Confirm Password">
              </div>

              <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Create Account</button>
              </div>

              <div class="col-12 text-center mt-4">
                <p class="mb-0">Already have an account?<a href="#" class="text-decoration-none fw-bold"> Login</a></p>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
