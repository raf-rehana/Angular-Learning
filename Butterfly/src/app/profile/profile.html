<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-lg border-0 text-center p-4">

 
        <div class="rounded-circle bg-lavender text-white d-flex align-items-center
                    justify-content-center mx-auto mb-3"
             style="width: 80px; height: 80px; font-size: 2rem;">
          {{ user?.firstName?.charAt(0) | uppercase }}
        </div>

        <h4 class="fw-bold">{{ user?.firstName }} {{ user?.lastName }}</h4>
        <p class="text-muted mb-1">{{ user?.email }}</p>
        <p class="text-muted mb-3">{{ user?.phone }}</p>

        <a routerLink="/edit-profile" class="btn btn-outline-primary mt-2">
          Edit Profile
        </a>

        <button (click)="logout()" class="btn btn-outline-danger mt-2 ms-2">
          Logout
        </button>

      </div>

    </div>
  </div>
</div>
