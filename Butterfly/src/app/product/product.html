<!-- product.html -->

<div class="container py-5">

  <!-- Page Heading -->
  <div class="mb-4">
    <h3 class="fw-bold mb-1">All Products</h3>
    <p class="text-muted mb-0">{{ filteredProducts.length }} products found</p>
  </div>

  <div class="row g-4">

    <!-- SIDEBAR -->
    <div class="col-lg-3">
      <div class="card border p-4">

        <h6 class="fw-bold mb-3">Category</h6>
        <div class="d-flex flex-column gap-2 mb-3">
          <button
            *ngFor="let cat of categoryList"
            (click)="filterByCategory(cat)"
            [class.btn-lavender]="selectedCategory === cat"
            [class.btn-outline-secondary]="selectedCategory !== cat"
            class="btn btn-sm text-start">
            {{ cat }}
          </button>
        </div>

        <hr>

        <h6 class="fw-bold mb-2">Max Price: ${{ maxPrice }}</h6>
        <input type="range"
               class="form-range mb-3"
               min="0" max="200" step="5"
               [(ngModel)]="maxPrice"
               (input)="applyFilters()"
               name="maxPrice">

        <hr>

        <button (click)="clearFilters()" class="btn btn-outline-secondary w-100">
          Clear Filters
        </button>

      </div>
    </div>

    <!-- MAIN -->
    <div class="col-lg-9">

      <!-- Search -->
      <div class="mb-4">
        <input [(ngModel)]="searchTerm"
               (input)="applyFilters()"
               name="searchTerm"
               type="text"
               class="form-control form-control-lg"
               placeholder="Search products...">
      </div>

      <!-- No results -->
      <div *ngIf="filteredProducts.length === 0" class="text-center py-5">
        <p class="text-muted fs-5">No products found.</p>
        <button (click)="clearFilters()" class="btn btn-lavender mt-2">
          Reset Filters
        </button>
      </div>

      <!-- Product Grid -->
      <div class="row g-4">
        <div class="col-sm-6 col-xl-4" *ngFor="let product of filteredProducts">
          <div class="card border h-100">

            <div class="position-relative">
              <img [src]="product.image"
                   [alt]="product.name"
                   onerror="this.src='https://placehold.co/300x200/ede9f6/7c5cbf?text=Product'"
                   class="card-img-top"
                   style="height:200px; object-fit:cover;">
              <span *ngIf="product.badge"
                    class="badge btn-lavender position-absolute top-0 start-0 m-2">
                {{ product.badge }}
              </span>
            </div>

            <div class="card-body">
              <small class="text-muted">{{ product.category }}</small>
              <h6 class="fw-semibold mt-1 mb-1">{{ product.name }}</h6>
              <p class="text-muted small mb-2">{{ product.description }}</p>
              <div class="d-flex justify-content-between align-items-center mt-3">
                <span class="fw-bold fs-5 btn-lavender-text">${{ product.price }}</span>
                <button (click)="addToCart(product)" class="btn btn-sm btn-lavender">
                  Add to Cart
                </button>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>

  </div>
</div>
